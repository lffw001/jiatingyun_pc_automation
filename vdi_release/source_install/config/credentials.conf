# VDI 自动登录配置文件

# 登录方式： password (账密登录) 或 sub_account (子账号登录)
login_method=password

# 请填写你的登录信息
# 手机号
phone=
# 密码
password=

# 连接的第几个云电脑，默认是0
connect_index=0

# ========================================
# 保活设置（可选调整）
# ========================================

# 保活间隔（秒），默认 10-15 分钟随机
keepalive_min_seconds=600
keepalive_max_seconds=900

# 保活方式：mouse_move（移动鼠标）或 keypress（按键）
# 建议使用 mouse_move，不会干扰真实操作
keepalive_method=mouse_move
# 被挤掉之后，300s之后脚本在运行，给用户主动登陆云电脑的时间
conflict_wait_seconds=300

# ========================================
# 性能优化：服务开关 (true/false)
# ========================================
# 是否开启 VNC 服务 (关闭可节省 CPU)
enable_vnc=true
# 是否开启 noVNC 服务 (仅需自动化运行时可关闭 网页观看)
enable_novnc=true

# ========================================
# 云电脑省资源特殊保活设置（可选调整）
# ========================================
# 是否开启省资源模式 (true/false)
# 开启后，脚本在成功连接后会断开，并每隔 20 分钟重新连接一次以刷新 30 分钟关机倒计时，从而节省资源
enable_pc_saving=false

# 每次连接进入桌面后，保持连接的持续时间（秒），用于确保服务端刷新成功
vdi_session_duration_seconds=20

# 断开连接后，等待重新连接的间隔时间（秒），建议设为 1200 秒（20分钟）
vdi_disconnect_duration_seconds=1200
